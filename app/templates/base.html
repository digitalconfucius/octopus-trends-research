<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Research Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        /* Card dismiss animation */
        .card-dismiss {
            transition: opacity 300ms ease-out, transform 300ms ease-out;
        }
        .card-dismiss.htmx-swapping {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Top nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <h1 class="text-lg font-semibold text-gray-900">Research Dashboard</h1>
                <div class="flex gap-4">
                    <a href="/"
                       class="text-sm {{ 'text-indigo-600 font-medium' if request.path == '/' or request.path.startswith('/dashboard') else 'text-gray-500 hover:text-gray-700' }}">
                        Dashboard
                    </a>
                    <a href="/admin"
                       class="text-sm {{ 'text-indigo-600 font-medium' if request.path.startswith('/admin') else 'text-gray-500 hover:text-gray-700' }}">
                        Admin
                    </a>
                </div>
            </div>
            <div class="text-sm text-gray-400">
                {{ now.strftime('%B %d, %Y') if now else '' }}
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
